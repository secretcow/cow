<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KuhPoker — Texas Hold'em mit Kuhhandel-Karten</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ============ LOBBY ============ -->
    <div id="lobby" class="screen">
      <div class="lobby-card">
        <div class="lang-switch" id="langSwitch">
          <button class="lang-btn" data-lang="de">DE</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <h1 class="logo">🐄 KuhPoker</h1>
        <p class="subtitle" data-i18n="subtitle"></p>

        <div class="profile-bar hidden" id="profileBar">
          <span class="pb-item"><span class="pb-icon">💰</span><span class="pb-val" id="pbWallet">–</span></span>
          <span class="pb-item"><span class="pb-icon">🏆</span><span class="pb-val" id="pbMatches">0</span></span>
        </div>

        <label data-i18n="yourName"></label>
        <input id="nameInput" maxlength="16" />

        <div class="lobby-actions">
          <div class="create-box">
            <div class="opt-row">
              <span data-i18n="maxPlayers"></span>
              <div class="seg" id="maxPlayersSeg">
                <button data-val="2">2</button>
                <button data-val="3">3</button>
                <button data-val="4">4</button>
                <button data-val="5">5</button>
                <button data-val="6" class="active">6</button>
              </div>
            </div>
            <div class="opt-row">
              <span data-i18n="startChips"></span>
              <div class="seg" id="stackSeg">
                <button data-val="500">500</button>
                <button data-val="1000" class="active">1000</button>
                <button data-val="2000">2000</button>
                <button data-val="5000">5000</button>
              </div>
            </div>
            <div class="opt-row">
              <span data-i18n="flushMode"></span>
              <div class="seg" id="flushSeg">
                <button data-val="off" class="active" data-i18n="off"></button>
                <button data-val="on" data-i18n="on"></button>
              </div>
            </div>
            <p class="opt-hint" id="flushHint" data-i18n="flushHint"></p>
            <div class="opt-row">
              <span data-i18n="tournamentMode"></span>
              <div class="seg" id="tourneySeg">
                <button data-val="off" class="active" data-i18n="off"></button>
                <button data-val="on" data-i18n="on"></button>
              </div>
            </div>
            <div class="opt-row hidden" id="levelHandsRow">
              <span data-i18n="levelLength"></span>
              <div class="seg" id="levelHandsSeg">
                <button data-val="4">4</button>
                <button data-val="6" class="active">6</button>
                <button data-val="8">8</button>
                <button data-val="10">10</button>
              </div>
            </div>
            <p class="opt-hint" id="tourneyHint" data-i18n="tourneyHint"></p>
            <div class="opt-row">
              <span data-i18n="cashMode"></span>
              <div class="seg" id="cashSeg">
                <button data-val="off" class="active" data-i18n="off"></button>
                <button data-val="on" data-i18n="on"></button>
              </div>
            </div>
            <p class="opt-hint" id="cashHint" data-i18n="cashHint"></p>
            <button id="createBtn" class="btn primary" data-i18n="createTable"></button>
          </div>

          <div class="or" data-i18n="or"></div>
          <div class="join-row">
            <input id="codeInput" maxlength="4" class="code-input" />
            <button id="joinBtn" class="btn" data-i18n="join"></button>
          </div>
        </div>

        <div id="waiting" class="waiting hidden">
          <p data-i18n="shareCode"></p>
          <div id="roomCode" class="room-code"></div>
          <button id="copyLinkBtn" class="btn small" data-i18n="copyLink"></button>
          <div class="player-list" id="lobbyPlayers"></div>
          <button id="startGameBtn" class="btn primary hidden" data-i18n="startGame"></button>
          <p class="hint" id="waitHint"></p>
        </div>

        <details class="rules leaderboard" id="leaderboardBox">
          <summary data-i18n="leaderboardTitle"></summary>
          <div id="leaderboardBody" class="lb-body"></div>
        </details>

        <details class="rules">
          <summary data-i18n="rulesSummary"></summary>
          <div id="rulesBody"></div>
        </details>
      </div>
    </div>

    <!-- ============ TISCH ============ -->
    <div id="game" class="screen hidden">
      <div class="topbar">
        <span class="conn" id="connStatus"></span>
        <span class="topcode" id="topCode"></span>
        <span class="blind-info hidden" id="blindInfo"></span>
        <div class="top-actions">
          <button class="lang-btn small-lang" id="gameLangBtn">DE</button>
          <button id="ranksBtn" class="btn small" title="Rangfolge">📊</button>
          <button id="cardsBtn" class="btn small" title="Karten">🃏</button>
          <button id="muteBtn" class="btn small" title="Ton">🔊</button>
          <button id="leaveBtn" class="btn small" title="Verlassen">🚪</button>
        </div>
      </div>

      <aside class="side-panel left collapsed" id="rankPanel">
        <div class="side-head">
          <span data-i18n="ranksTitle"></span>
          <button class="side-close" data-panel="rankPanel">✕</button>
        </div>
        <div class="side-body" id="rankBody"></div>
      </aside>
      <aside class="side-panel right collapsed" id="cardPanel">
        <div class="side-head">
          <span data-i18n="cardsTitle"></span>
          <button class="side-close" data-panel="cardPanel">✕</button>
        </div>
        <div class="side-body" id="cardBody"></div>
      </aside>

      <div class="table">
        <div class="replay-bar hidden" id="replayBar">
          <span class="replay-tag" id="replayTag"></span>
          <button class="btn small" id="replayPrev" title="Zurück">⏮</button>
          <button class="btn small" id="replayPlay" title="Play/Pause">⏸</button>
          <button class="btn small" id="replayNext" title="Vor">⏭</button>
          <span class="replay-pos" id="replayPos"></span>
          <button class="btn small" id="replayClose" title="Schließen">✕</button>
        </div>
        <div class="seats" id="seats"></div>
        <div class="center">
          <div class="pot" id="pot"></div>
          <div class="community" id="community"></div>
          <div class="stage-label" id="stageLabel"></div>
          <div class="result-banner hidden" id="resultBanner"></div>
          <div class="result-detail hidden" id="resultDetail"></div>
        </div>
      </div>

      <!-- Aktionen -->
      <div class="controls" id="controls">
        <div class="turn-indicator" id="turnIndicator"></div>
        <div class="action-buttons hidden" id="actionButtons">
          <button class="btn act" data-act="fold" id="foldBtn"></button>
          <button class="btn act" id="checkCallBtn" data-act="call"></button>
          <button class="btn act primary" id="raiseBtn" data-act="raise"></button>
        </div>
        <div class="raise-panel hidden" id="raisePanel">
          <input type="range" id="raiseSlider" />
          <div class="raise-row">
            <input type="number" id="raiseAmount" />
            <button class="btn small" data-quick="min" data-i18n="min"></button>
            <button class="btn small" data-quick="3bb" id="quick3bb">3 BB</button>
            <button class="btn small" data-quick="pot" data-i18n="potBtn"></button>
            <button class="btn small" data-quick="max" data-i18n="allIn"></button>
          </div>
          <div class="raise-confirm">
            <button class="btn" id="raiseCancel" data-i18n="back"></button>
            <button class="btn primary" id="raiseConfirm" data-i18n="raiseDo"></button>
          </div>
        </div>
        <button class="btn small hidden" id="showCardsBtn"></button>
        <button class="btn small hidden" id="replayBtn"></button>
        <button class="btn small hidden" id="rebuyBtn"></button>
        <button class="btn primary big hidden" id="nextHandBtn"></button>
        <div class="match-over hidden" id="matchOver">
          <div id="matchOverText"></div>
          <button class="btn primary big" id="rematchBtn" data-i18n="rematch"></button>
        </div>
      </div>

      <div class="log" id="log"></div>

      <div class="chat" id="chatPanel">
        <div class="chat-messages" id="chatMessages"></div>
        <form class="chat-input" id="chatForm" autocomplete="off">
          <input id="chatInput" maxlength="200" autocomplete="off" />
          <button class="btn small" type="submit" id="chatSend"></button>
        </form>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
  </body>
</html>
